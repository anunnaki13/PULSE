# PULSE — public vhost. REQ-nginx-config + CONSTR-security-headers + REQ-no-evidence-upload
# defense-in-depth + Phase-1 rate-limit subset (REQ-rate-limiting-general scoped to auth/ai/api).
# HTTP-only on :80 inside container; host publishes via ${APP_HOST_PORT:-3399}:80.
# TLS / HTTPS deferred per DEC-011 (RESEARCH.md Assumption A8).

# Upstream blocks for keepalive + clear declaration. The hostnames `pulse-backend` and
# `pulse-frontend` are resolved by Docker's embedded DNS at 127.0.0.11 when this
# container runs on the `pulse-net` network (compose attaches it automatically).
# nginx -t (config test) will DNS-resolve upstreams at parse time, so the offline
# `nginx -t` verify block in Plan 01-02 passes the upstream names via `--add-host`
# stubs (loopback) — at runtime, embedded DNS overrides them.
upstream pulse_backend  { server pulse-backend:8000; keepalive 16; }
upstream pulse_frontend { server pulse-frontend:80;  keepalive 16; }

# Rate-limit zones — scoped per-IP (binary_remote_addr is 4 bytes/IPv4, ~160k IPs in 10MB).
#   api_zone    : general /api/* (REQ-nginx-config: 60r/s with burst).
#   ai_zone     : /api/v1/ai/* (REQ-rate-limiting-general: 20r/min for AI; wired now so
#                 Phase 5 does not need to retro-fit nginx config).
#   login_zone  : /api/v1/auth/login (REQ-auth-jwt brute-force defense; T-02-S-01).
limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=60r/s;
limit_req_zone $binary_remote_addr zone=ai_zone:10m    rate=20r/m;
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name pulse.tenayan.local _;

    # ------------------------------------------------------------------
    # Locked security headers (CONSTR-security-headers). `always` so they
    # fire on error responses too (which `add_header` skips by default).
    # ------------------------------------------------------------------
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Cap multipart payload — REQ-no-evidence-upload defense in depth.
    # Backend separately rejects multipart bodies on every endpoint EXCEPT the
    # admin-only `/konkin/templates/{id}/import-from-excel` (which is also CSRF-gated).
    client_max_body_size 25M;

    # ------------------------------------------------------------------
    # Auth login — strict per-IP throttle (T-02-S-01 brute-force defense).
    # MUST be declared above the generic /api/ block so it wins on prefix match.
    # ------------------------------------------------------------------
    location = /api/v1/auth/login {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass http://pulse_backend;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # ------------------------------------------------------------------
    # AI endpoints — wired now to avoid retro-fits in Phase 5.
    # ^~ ensures these take precedence over the generic /api/ block.
    # ------------------------------------------------------------------
    location ^~ /api/v1/ai/ {
        limit_req zone=ai_zone burst=5 nodelay;
        proxy_pass http://pulse_backend;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # ------------------------------------------------------------------
    # General API — 60r/s with burst window (REQ-nginx-config).
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://pulse_backend;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # ------------------------------------------------------------------
    # WebSocket — stub for Phase 1; Phase 2 wires actual /ws/* routes.
    # Upgrade headers MUST be set explicitly (override the shared include's defaults).
    # ------------------------------------------------------------------
    location /ws/ {
        limit_conn ws_conn 20;
        proxy_pass http://pulse_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------------------------------------------
    # Static frontend (SPA). pulse-frontend serves index.html + hashed assets.
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://pulse_frontend;
        include /etc/nginx/conf.d/_proxy.inc;
    }
}
