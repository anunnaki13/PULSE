# PULSE — nginx top-level. Minimal; per-vhost concerns live in conf.d/*.conf.
# Server blocks (including rate-limit zones) are loaded from /etc/nginx/conf.d.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Access log to stdout so `docker logs pulse-nginx` works without volume hacks.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile         on;
    tcp_nopush       on;
    keepalive_timeout 65;
    server_tokens    off;

    # Compress text-y responses on the way out (frontend assets travel via this layer).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Vhost + rate-limit zones come from here.
    include /etc/nginx/conf.d/*.conf;
}
