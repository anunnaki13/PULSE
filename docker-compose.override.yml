# PULSE — Docker Compose dev overrides.
# Auto-loaded by `docker compose` when present. Disable for prod with:
#   docker compose -f docker-compose.yml up -d
# (or rename this file before deploy).

services:

  # Backend dev: bind-mount source, switch to uvicorn --reload, bypass gunicorn entrypoint.
  pulse-backend:
    volumes:
      - ./backend:/app:rw
    environment:
      RELOAD: "true"
      PYTHONUNBUFFERED: "1"
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
      ]

  # Frontend dev: switch from the static nginx build to Vite dev server with HMR.
  pulse-frontend:
    volumes:
      - ./frontend:/app:rw
    command: ["pnpm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
