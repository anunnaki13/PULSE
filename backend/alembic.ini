[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# Timestamp-prefixed revision filenames — avoids collisions when Plan 05 and
# Plan 06 each generate a revision in parallel worktrees (slug-only filenames
# would collide on the same rev id).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in file_template (UTC keeps cross-machine order stable).
timezone = UTC

# Truncate slug to keep filenames sane on Windows.
truncate_slug_length = 40

# Use os.pathsep as path separator for `version_locations` (single-line entry).
version_path_separator = os

# sqlalchemy.url is intentionally blank — env.py reads from
# `app.core.config.settings.SQLALCHEMY_DATABASE_URL` so the URL is sourced
# from `.env` and never duplicated here.
sqlalchemy.url =

# Optional: set output encoding for revision templates.
output_encoding = utf-8


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
