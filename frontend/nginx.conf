# PULSE — internal nginx for the frontend container.
# The public-facing pulse-nginx layer owns security headers, rate limits, and TLS.
# This file ONLY serves the SPA with a try_files fallback + gzip.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text-ish assets — JS, CSS, JSON, SVG, fonts.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Long-cache hashed Vite assets (`assets/*.[hash].js|css`).
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path serves index.html so React Router can route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
